<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Code Scanner</title>
    <!-- Tailwind CSS for modern, responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTML5-QRCode Library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans text-gray-800">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 flex flex-col items-center">
        
        <div class="mb-6 text-center">
            <h1 class="text-2xl font-bold text-gray-900 mb-2">QR Scanner</h1>
            <p class="text-sm text-gray-500">Point your camera or upload an image</p>
        </div>

        <!-- Reader Container -->
        <div id="reader-container" class="w-full relative rounded-lg overflow-hidden bg-black flex items-center justify-center min-h-[300px]">
            <div id="reader" class="w-full h-full"></div>
            <!-- Initial Placeholder -->
            <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-white p-4 text-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <p>Camera is off</p>
            </div>
        </div>

        <!-- Error Message Display -->
        <div id="error-message" class="hidden mt-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center w-full"></div>

        <!-- Controls -->
        <div class="mt-6 w-full flex flex-col gap-3">
            <div class="flex gap-3">
                <button id="start-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition shadow-md flex justify-center items-center">
                    Start Live Camera
                </button>
                <button id="stop-btn" class="hidden flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-3 px-4 rounded-xl transition shadow-md justify-center items-center">
                    Stop Camera
                </button>
            </div>
            
            <div class="relative w-full">
                <!-- Hidden file input that triggers native camera/gallery -->
                <input type="file" id="file-input" accept="image/*" capture="environment" class="hidden">
                <button id="file-btn" class="w-full bg-indigo-100 hover:bg-indigo-200 text-indigo-800 font-semibold py-3 px-4 rounded-xl transition shadow-md flex justify-center items-center border border-indigo-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    Take Photo / Upload Image
                </button>
            </div>
        </div>

        <!-- Results Area -->
        <div id="result-container" class="mt-6 w-full hidden flex-col">
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-2">Scan Result</h3>
            <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 break-all shadow-inner">
                <p id="scanned-result" class="text-gray-900 font-medium"></p>
            </div>
            <div class="mt-3 flex gap-2">
                 <button id="copy-btn" class="flex-1 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-2 px-4 rounded-lg transition text-sm">
                    Copy Text
                </button>
                <a id="action-btn" href="#" target="_blank" class="hidden flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition text-sm text-center">
                    Open Link
                </a>
            </div>

            <!-- New Google Sheets Data Area -->
            <div id="sheets-data-container" class="mt-4 hidden flex-col border-t border-gray-200 pt-4">
                <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-2">Google Sheets Data</h3>
                <div id="sheets-loading" class="text-sm text-gray-500 italic flex items-center">
                    <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Fetching data from Google Sheets...
                </div>
                <div id="sheets-result" class="hidden bg-blue-50 border border-blue-200 rounded-xl p-4 shadow-inner text-sm text-gray-800">
                    <!-- Data will be injected here -->
                </div>
            </div>
        </div>

    </div>

    <script>
        let html5QrCode;
        const readerElementId = "reader";
        
        // UI Elements
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const fileBtn = document.getElementById('file-btn');
        const fileInput = document.getElementById('file-input');
        const placeholder = document.getElementById('placeholder');
        const resultContainer = document.getElementById('result-container');
        const scannedResultEl = document.getElementById('scanned-result');
        const errorMessageEl = document.getElementById('error-message');
        const copyBtn = document.getElementById('copy-btn');
        const actionBtn = document.getElementById('action-btn');

        // New UI Elements for Sheets
        const sheetsContainer = document.getElementById('sheets-data-container');
        const sheetsLoading = document.getElementById('sheets-loading');
        const sheetsResult = document.getElementById('sheets-result');

        // *** IMPORTANT: REPLACE WITH YOUR APPS SCRIPT WEB APP URL ***
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2KwSnwWKBOlz5g0SHTASuUgPZHyHJCh1gIo3FnlhSF3YOT3c4mWvYHxBCSUQP9xk2/exec";

        // Check if string is a valid URL
        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return false;  
            }
        }

        // Initialize Live Scanner
        function startScanner() {
            errorMessageEl.classList.add('hidden');
            resultContainer.classList.add('hidden');
            
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode(readerElementId);
            }

            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start(
                { facingMode: "environment" },
                config,
                onScanSuccess,
                onScanFailure
            ).then(() => {
                startBtn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
                stopBtn.classList.add('flex');
                placeholder.classList.add('hidden');
            }).catch((err) => {
                console.error("Error starting camera", err);
                
                // User-friendly error explicitly directing them to the fallback
                let errorMsg = "Could not start live camera due to browser/iframe restrictions. Please use the 'Take Photo / Upload Image' button below instead.";
                showError(errorMsg);
            });
        }

        function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    resetUI();
                }).catch(err => {
                    console.error("Error stopping scanner", err);
                });
            } else {
                resetUI();
            }
        }

        function resetUI() {
            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            stopBtn.classList.remove('flex');
            placeholder.classList.remove('hidden');
            if (html5QrCode) {
                html5QrCode.clear();
            }
        }

        function showError(message) {
            errorMessageEl.textContent = message;
            errorMessageEl.classList.remove('hidden');
        }

        // Callback when QR is successfully scanned
        function onScanSuccess(decodedText) {
            stopScanner();
            
            scannedResultEl.textContent = decodedText;
            resultContainer.classList.remove('hidden');
            resultContainer.classList.add('flex');

            if (isValidUrl(decodedText)) {
                actionBtn.href = decodedText;
                actionBtn.classList.remove('hidden');
            } else {
                actionBtn.classList.add('hidden');
                actionBtn.href = "#";
            }

            // Fetch data from Google Sheets automatically
            fetchSheetData(decodedText);
        }

        async function fetchSheetData(scannedData) {
            if (APPS_SCRIPT_URL === "YOUR_WEB_APP_URL_HERE") {
                sheetsContainer.classList.remove('hidden');
                sheetsContainer.classList.add('flex');
                sheetsLoading.classList.add('hidden');
                sheetsResult.classList.remove('hidden');
                sheetsResult.innerHTML = `<p class="text-yellow-700"><strong>Note:</strong> Set your APPS_SCRIPT_URL in the code to connect to your sheets.</p>`;
                return;
            }

            // Show loading state
            sheetsContainer.classList.remove('hidden');
            sheetsContainer.classList.add('flex');
            sheetsLoading.classList.remove('hidden');
            sheetsResult.classList.add('hidden');

            try {
                // Send POST request to Apps Script
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    // Note: sending as plain text avoids strict CORS preflight checks from GitHub to Google
                    body: JSON.stringify({ action: 'process_qr', qrCode: scannedData })
                });

                const data = await response.json();

                sheetsLoading.classList.add('hidden');
                sheetsResult.classList.remove('hidden');

                if (data.success) {
                    sheetsResult.innerHTML = `
                        <p><strong>Status:</strong> <span class="text-green-600 font-semibold">Processed Successfully</span></p>
                        <div class="mt-2 text-gray-700">${data.message}</div>
                    `;
                } else {
                    sheetsResult.innerHTML = `<p class="text-red-600"><strong>Error:</strong> ${data.error}</p>`;
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                sheetsLoading.classList.add('hidden');
                sheetsResult.classList.remove('hidden');
                sheetsResult.innerHTML = `<p class="text-red-600">Failed to communicate with the database. Check console.</p>`;
            }
        }

        function onScanFailure(error) {
            // Ignore frame failures
        }

        // --- Event Listeners ---
        
        startBtn.addEventListener('click', startScanner);
        stopBtn.addEventListener('click', stopScanner);

        // Native Camera / File Upload Fallback Logic
        fileBtn.addEventListener('click', () => {
            fileInput.click(); // Open file dialog / native camera
        });

        fileInput.addEventListener('change', e => {
            if (e.target.files.length == 0) return;
            
            const file = e.target.files[0];
            errorMessageEl.classList.add('hidden');
            resultContainer.classList.add('hidden');

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode(readerElementId);
            }

            const originalBtnText = fileBtn.innerHTML;
            fileBtn.innerHTML = "Scanning image...";

            // Scan the static image
            html5QrCode.scanFile(file, true)
                .then(decodedText => {
                    onScanSuccess(decodedText);
                    fileBtn.innerHTML = originalBtnText;
                    fileInput.value = ""; // Reset input
                })
                .catch(err => {
                    showError("No QR code found in the image. Please try again or ensure the code is clear.");
                    fileBtn.innerHTML = originalBtnText;
                    fileInput.value = ""; // Reset input
                });
        });

        // Copy to clipboard fallback logic
        copyBtn.addEventListener('click', () => {
            const textToCopy = scannedResultEl.textContent;
            
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    copyBtn.textContent = "Copied!";
                    setTimeout(() => copyBtn.textContent = "Copy Text", 2000);
                });
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    copyBtn.textContent = "Copied!";
                    setTimeout(() => copyBtn.textContent = "Copy Text", 2000);
                } catch (err) {
                    console.error('Fallback copy failed', err);
                    alert("Copy failed. Please manually select and copy the text.");
                }
                document.body.removeChild(textArea);
            }
        });

    </script>
</body>
</html>
